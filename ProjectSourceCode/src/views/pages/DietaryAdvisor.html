<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dietary Advisor</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>

<style>
    body {
      background-color: #A2A4A3;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .navbar {
      background-color: black;
    }

    .navbar img {
      height: 40px;
    }

    .btn-cu {
      background-color: #CFB87C;
      color: black;
    }

    .btn-cu:hover {
      background-color: #bfa56a;
      color: black;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar px-3">
    <img src="https://upload.wikimedia.org/wikipedia/en/thumb/5/5b/Colorado_Buffaloes_logo.svg/256px-Colorado_Buffaloes_logo.svg.png">
  </nav>

  <div class="container mt-5">

    <h2 class="text-center mb-3">Dietary Advisor</h2>
    <p class="text-center text-muted">Find meals that match your dietary needs</p>

    <!-- Filters -->
    <div class="card p-4 shadow mb-4">

      <div class="mb-3">
        <label class="form-label">Diet Type</label>
        <select id="diet" class="form-select">
          <option value="none">No Preference</option>
          <option value="vegetarian">Vegetarian</option>
          <option value="vegan">Vegan</option>
          <option value="keto">Keto</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Allergies</label><br>
        <input type="checkbox" value="nuts"> Nuts
        <input type="checkbox" value="dairy" class="ms-3"> Dairy
        <input type="checkbox" value="gluten" class="ms-3"> Gluten
      </div>

      <button class="btn btn-cu w-100" onclick="filterMeals()">Find Meals</button>

    </div>

    <!-- Results -->
    <div id="results" class="row g-3"></div>

  </div>

</html>
